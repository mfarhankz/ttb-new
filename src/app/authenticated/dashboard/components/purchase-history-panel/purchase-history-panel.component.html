<ng-template #purchaseFilterPanel>
  <div class="rounded-lg border border-border bg-surface px-2.5 py-1.5">
    <div class="flex flex-wrap items-center gap-2">
      <p-iconfield class="w-full min-w-0 sm:w-64">
        <p-inputicon class="pi pi-search" />
        <input
          id="purchase-history-search"
          pInputText
          type="text"
          class="w-full h-[42px]"
          pSize="small"
          placeholder="Search purchases"
          [value]="searchText()"
          (input)="onSearchInput($event)"
        />
        @if (searchText()) {
          <p-inputicon
            class="pi pi-times cursor-pointer"
            role="button"
            tabindex="0"
            aria-label="Clear search"
            (click)="clearSearch()"
            (keydown.enter)="clearSearch()"
          />
        }
      </p-iconfield>

      <p-select
        inputId="purchase-history-search-field"
        size="small"
        class="w-full shrink-0 sm:min-w-64 sm:w-auto"
        [options]="filterFieldOptions"
        optionLabel="label"
        optionValue="value"
        placeholder="Filter by"
        [ngModel]="searchField()"
        (ngModelChange)="onSearchFieldChange($event)"
      />
    </div>
  </div>
</ng-template>

<app-data-table
  [columns]="columns"
  [rows]="rows()"
  [loading]="loading()"
  [error]="error()"
  [emptyTitle]="'No purchases yet'"
  [emptyDescription]="emptyDescription()"
/>

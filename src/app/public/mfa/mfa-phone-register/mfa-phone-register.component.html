<div [class]="modalMode ? 'w-full' : 'min-h-[calc(100vh-8rem)] flex items-center justify-center'">
  <div [class]="modalMode ? 'w-full flex flex-col gap-6' : 'max-w-md w-full flex flex-col gap-8 p-8 bg-surface rounded-lg shadow-md'">
    <div>
      <h2 [class]="modalMode ? 'text-h3 font-semibold text-foreground' : 'text-h1 font-bold text-center text-foreground'">
        Register Phone for MFA
      </h2>
      <p [class]="modalMode ? 'mt-2 text-body-sm text-muted' : 'mt-2 text-center text-body-sm text-muted'">
        For added security, we use Multi-Factor Authentication (MFA)
      </p>
    </div>

    <form [formGroup]="phoneForm" (ngSubmit)="onSubmit()" class="mt-8 flex flex-col gap-6">
      <div class="flex flex-col gap-4">
        <app-input
          id="phone"
          type="tel"
          label="Phone Number"
          placeholder="Enter 10-digit phone number"
          formControlName="phone"
          [error]="getPhoneError()"
          [required]="true"
          maxlength="10"
          class="m-2"
        />
        <p class="text-body-sm text-muted">Enter your 10-digit phone number (no dashes or spaces)</p>
      </div>

      @if (errorMessage()) {
        <app-alert type="error" [title]="errorMessage()" [dismissible]="true" (onDismiss)="errorMessage.set('')" />
      }

      <div class="flex gap-4">
        <app-button
          type="button"
          variant="outline"
          (onClick)="onCancel()"
          [disabled]="isLoading()"
          [fullWidth]="true"
        >
          Cancel
        </app-button>
        <app-button
          type="submit"
          variant="primary"
          [disabled]="phoneForm.invalid || isLoading()"
          [loading]="isLoading()"
          [fullWidth]="true"
        >
          Send Verification Code
        </app-button>
      </div>
    </form>
  </div>
</div>

<div class="inline-flex items-center rounded-lg border border-border bg-surface p-0.5">
  @for (option of options(); track option.mode) {
    <button
      type="button"
      class="inline-flex items-center gap-1.5 rounded-md px-3 py-1.5 text-body-sm font-medium transition-colors focus:outline-hidden focus-visible:ring-2 focus-visible:ring-focus focus-visible:ring-offset-2"
      [class.bg-primary/10]="value() === option.mode"
      [class.text-primary]="value() === option.mode"
      [class.text-muted]="value() !== option.mode"
      [class.hover:text-foreground]="value() !== option.mode"
      [attr.aria-pressed]="value() === option.mode"
      (click)="select(option.mode)"
    >
      <i [class]="option.icon + ' text-xs'" aria-hidden="true"></i>
      {{ option.label }}
    </button>
  }
</div>

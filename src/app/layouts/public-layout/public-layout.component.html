<div class="min-h-screen bg-background flex flex-col">
  <header class="bg-surface shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <a routerLink="/" class="flex items-center gap-3 min-w-0">
          <img
            [src]="vertical.publicPageLogoUrl()"
            [alt]="vertical.companyName()"
            class="h-10 max-w-[190px] object-contain object-left"
            [ngStyle]="vertical.publicLogoStyle()"
          />
        </a>
        <nav class="flex space-x-4">
          <a routerLink="/" class="text-muted hover:text-foreground">Home</a>
          <a routerLink="/login" class="text-muted hover:text-foreground">Login</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="flex-1">
    <router-outlet></router-outlet>
  </main>

  <footer class="bg-surface border-t border-border mt-auto">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
      <p class="text-center text-muted text-body-sm">
        &copy; {{ currentYear }} {{ vertical.companyName() }}. All rights reserved.
      </p>
    </div>
  </footer>
</div>

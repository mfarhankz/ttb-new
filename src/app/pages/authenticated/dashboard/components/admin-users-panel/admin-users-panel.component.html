<ng-template #usersFilterPanel>
  <div class="rounded-lg border border-border bg-surface px-2.5 py-1.5">
    <div class="flex flex-wrap items-center gap-2">
      <p-iconfield class="w-full min-w-0 sm:w-52">
        <p-inputicon class="pi pi-search" />
        <input
          id="admin-users-search"
          pInputText
          type="search"
          class="w-full"
          pSize="small"
          placeholder="Search name or email"
          [value]="searchText()"
          (input)="onSearchInput($event)"
        />
        @if (searchText()) {
          <p-inputicon
            class="pi pi-times cursor-pointer"
            role="button"
            tabindex="0"
            aria-label="Clear search"
            (click)="clearSearch()"
            (keydown.enter)="clearSearch()"
          />
        }
      </p-iconfield>

      <p-select
        inputId="admin-users-type"
        class="w-full shrink-0 sm:min-w-[11rem] sm:w-auto"
        [options]="userTypeOptions()"
        optionLabel="label"
        optionValue="value"
        placeholder="User type"
        [ngModel]="userTypeFilter()"
        (ngModelChange)="onUserTypeChange($event)"
      />

      <div class="flex shrink-0 items-center gap-1.5">
        <p-toggleswitch
          inputId="include-inactive-users"
          [ngModel]="includeInactive()"
          (ngModelChange)="onIncludeInactiveChange($event)"
        />
        <label for="include-inactive-users" class="cursor-pointer select-none whitespace-nowrap text-caption text-muted">
          Inactive
        </label>
      </div>

      <div class="flex shrink-0 items-center gap-1.5 text-caption text-muted sm:ml-auto">
        @if (searching()) {
          <i class="pi pi-spin pi-spinner text-primary" aria-hidden="true"></i>
        }
        <span>{{ resultSummary() }}</span>
      </div>
    </div>
  </div>
</ng-template>

<app-data-table
  [columns]="columns"
  [rows]="rows()"
  [loading]="loading()"
  [error]="error()"
  [pageSize]="100"
  emptyTitle="No users found"
  [emptyDescription]="emptyDescription()"
  (rowAction)="onRowAction($event)"
/>

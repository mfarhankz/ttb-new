<div class="p-8 w-full">
  <div class="w-full mb-8">
    <h1 class="text-h1 font-bold text-foreground mb-2">Dashboard</h1>
    <p class="text-body text-muted">
      Welcome, <span class="font-semibold text-foreground">{{ name() }}</span>!
    </p>
  </div>

  <div class="flex flex-col xl:flex-row gap-6 items-start">
    <div #walletColumn class="w-full xl:w-1/3">
      <app-wallet-balance-card />
    </div>
    <div
      class="w-full xl:flex-1 min-w-0 flex"
      [class.min-h-0]="!subscriptionExpanded()"
      [style.height.px]="subscriptionColumnHeight() ?? undefined"
    >
      <app-subscription-card
        class="w-full"
        [class.flex-1]="!subscriptionExpanded()"
        [class.min-h-0]="!subscriptionExpanded()"
        [heightLocked]="!subscriptionExpanded()"
        (expandedChange)="subscriptionExpanded.set($event)"
      />
    </div>
  </div>
</div>

<app-modal
  #modal
  id="session-login-modal"
  title="Session Expired"
  size="sm"
  [showCloseButton]="false"
  [showFooter]="false"
  [closeOnBackdropClick]="false"
  [backdropClickable]="false"
>
  @if (sessionExpiredService.loginModalOpen()) {
    <app-login
      [modalMode]="true"
      [sessionExpired]="true"
      (loginSuccess)="onLoginSuccess()"
    />
  }
</app-modal>

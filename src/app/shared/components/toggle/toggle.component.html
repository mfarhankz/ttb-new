<div [class]="wrapperClass">
  <div
    class="flex items-center justify-between gap-4 rounded-lg border border-border bg-sidebar-active/15 px-4 py-3"
    [class.opacity-50]="disabled"
  >
    @if (label) {
      <label
        [id]="id + '-label'"
        [for]="id"
        class="text-body-sm font-medium text-foreground select-none"
        [class.cursor-pointer]="!disabled"
        [class.cursor-not-allowed]="disabled"
      >
        {{ label }}
        @if (required) {
          <span class="text-danger">*</span>
        }
      </label>
    }

    <button
      [id]="id"
      type="button"
      role="switch"
      [attr.aria-checked]="checked"
      [attr.aria-labelledby]="label ? id + '-label' : null"
      [disabled]="disabled"
      [class]="getTrackClasses()"
      (click)="toggle()"
      (blur)="onBlur()"
    >
      <span [class]="getThumbClasses()" aria-hidden="true"></span>
    </button>
  </div>

  @if (hint && !error) {
    <p class="mt-1.5 text-caption text-muted">{{ hint }}</p>
  }
  @if (error) {
    <p class="mt-1.5 text-caption text-danger">{{ error }}</p>
  }
</div>

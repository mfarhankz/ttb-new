<div [class]="wrapperClass">
  <label [for]="id" class="flex items-center cursor-pointer" [class.cursor-not-allowed]="disabled">
    <input
      [id]="id"
      type="radio"
      [name]="name"
      [value]="value"
      [checked]="isChecked"
      [disabled]="disabled"
      [required]="required"
      [class]="getRadioClasses()"
      (change)="onChange($event)"
      (blur)="onBlur()"
    />
    @if (label) {
      <span [class]="getLabelClasses()" class="ml-2">
        {{ label }}
        @if (required) {
          <span class="text-danger">*</span>
        }
      </span>
    }
    <ng-content></ng-content>
  </label>
  @if (hint && !error) {
    <p class="mt-1 text-body-sm text-muted ml-6">{{ hint }}</p>
  }
  @if (error) {
    <p class="mt-1 text-body-sm text-danger ml-6">{{ error }}</p>
  }
</div>

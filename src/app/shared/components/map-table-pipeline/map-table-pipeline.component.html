<div class="flex h-full min-h-0 flex-col bg-background">
  <div class="flex shrink-0 flex-wrap items-center gap-3 border-b border-border bg-surface/80 px-4 py-2">
    @if (viewOptions().length > 1) {
      <app-map-pipeline-view-toggle
        [options]="viewOptions()"
        [value]="viewMode()"
        (valueChange)="onViewModeChange($event)"
      />
    }
    <div class="ml-auto flex flex-wrap items-center gap-2">
      <ng-content select="[mapTablePipelineToolbar]" />
    </div>
  </div>

  <div #container class="flex min-h-0 flex-1 flex-row">
    <div class="relative h-full min-h-0 overflow-hidden" [ngStyle]="mapPanelStyle()">
      <ng-content select="[mapTablePipelineMap]" />
    </div>

    @if (viewMode() === 'both') {
      <div
        class="relative z-10 flex w-2 shrink-0 cursor-col-resize items-stretch justify-center bg-border/80 hover:bg-primary/30"
        role="separator"
        aria-orientation="vertical"
        aria-label="Resize map and table panels"
        (pointerdown)="onDragStart($event)"
      >
        <span class="my-auto h-10 w-0.5 rounded-full bg-muted" aria-hidden="true"></span>
      </div>
    }

    <div class="flex h-full min-h-0 flex-col p-4" [ngStyle]="tablePanelStyle()">
      <div class="flex min-h-0 flex-1 flex-col overflow-hidden">
        <ng-content select="[mapTablePipelineTable]" />
      </div>
    </div>
  </div>
</div>

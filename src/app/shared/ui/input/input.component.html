<div [class]="wrapperClass">
  @if (label) {
    <label [for]="id" [class]="labelClass">
      {{ label }}
      @if (required) {
        <span class="text-danger">*</span>
      }
    </label>
  }
  <div class="relative">
    @if (icon) {
      <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
        <i [class]="icon" class="text-subtle"></i>
      </div>
    }
    <input
      [id]="id"
      [type]="inputType"
      [placeholder]="placeholder"
      [disabled]="isDisabled"
      [readonly]="readonly"
      [required]="required"
      [class]="getInputClasses()"
      [value]="value"
      (input)="onInput($event)"
      (blur)="onBlur()"
      (focus)="onFocus()"
    />
    @if (showPasswordToggle) {
      <button
        type="button"
        class="absolute inset-y-0 right-0 flex w-10 cursor-pointer items-center justify-center border-0 bg-transparent text-subtle transition-colors hover:text-foreground focus:outline-hidden focus-visible:ring-2 focus-visible:ring-focus focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50"
        [disabled]="isDisabled"
        [attr.aria-label]="passwordVisible ? 'Hide password' : 'Show password'"
        [attr.aria-pressed]="passwordVisible"
        (click)="togglePasswordVisibility()"
      >
        <i [class]="passwordVisible ? 'pi pi-eye-slash' : 'pi pi-eye'" aria-hidden="true"></i>
      </button>
    } @else if (suffixIcon) {
      <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
        <i [class]="suffixIcon" class="text-subtle"></i>
      </div>
    }
  </div>
  @if (hint && !error) {
    <p class="mt-1 text-body-sm text-muted">{{ hint }}</p>
  }
  @if (error) {
    <p class="mt-0.5 text-body-sm leading-tight text-danger">{{ error }}</p>
  }
</div>
